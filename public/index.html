<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date App 😏</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec, #f8bbd0);
    color: #333;
    overflow: hidden;
}

.container {
    background: #fff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 500px;
    width: 90%;
    z-index: 10;
}

h1 {
    color: #880e4f;
    margin-bottom: 25px;
    font-size: 2.3rem;
}

input[type="date"] {
    padding: 12px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 8px;
    margin-bottom: 25px;
    width: 100%;
    box-sizing: border-box;
}

input[type="date"]:focus {
    outline: none;
    border-color: #880e4f;
}

.btn-group {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
    flex-wrap: wrap;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    font-weight: bold;
}

button:active {
    transform: translateY(2px);
}

#yesBtn {
    background-color: #4caf50;
    color: white;
}

#yesBtn:hover {
    box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
}

#noBtn {
    background-color: #f44336;
    color: white;
}

#noBtn:hover {
    box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
}

#result {
    margin-top: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #444;
}

#cat {
    width: 100%;
    max-width: 300px;
    border-radius: 15px;
    margin: 20px auto 0 auto;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

#liveBox {
    margin-top: 35px;
    padding: 20px;
    border: 2px dashed #aaa;
    border-radius: 15px;
    background-color: #fcfcfc;
}

#liveBox h3 {
    margin-top: 0;
    color: #666;
}

#liveText {
    font-size: 1.1rem;
    font-style: italic;
    color: #777;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear forwards;
    z-index: 20;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* Fixierte & funktionierende Hintergrund-GIFs */
.cat-background {
    position: fixed;
    width: 180px;
    height: 180px;
    object-fit: cover;
    opacity: 0.15; /* Leicht erhöht für bessere Sichtbarkeit */
    border-radius: 10px;
    z-index: 1;
}

#bg-cat-1 { top: 5%; left: 5%; }
#bg-cat-2 { top: 5%; right: 5%; }
#bg-cat-3 { bottom: 5%; left: 5%; }
#bg-cat-4 { bottom: 5%; right: 5%; }

@media (max-width: 768px) {
    .cat-background {
        width: 100px;
        height: 100px;
    }
}
</style>
</head>

<body>

    <!-- Neue, funktionierende Hintergrund-GIF-Links -->
    <img id="bg-cat-1" class="cat-background" src="https://media.tenor.com/J3Z7978Z9wAAAAAi/cat-cats.gif" alt="Cat">
    <img id="bg-cat-2" class="cat-background" src="https://media.tenor.com/v8p77R94Z6IAAAAi/kitty-cat.gif" alt="Cat">
    <img id="bg-cat-3" class="cat-background" src="https://media.tenor.com/bK777gSh6Y0AAAAi/kitty-cat.gif" alt="Cat">
    <img id="bg-cat-4" class="cat-background" src="https://media.tenor.com/Z9WfW71v9isAAAAi/peach-cat.gif" alt="Cat">

    <div class="container">
        <h1 id="title"></h1>

        <input type="date" id="date"><br>

        <div class="btn-group">
            <button id="yesBtn">Ja 😍</button>
            <button id="noBtn">Nein 😈</button>
        </div>

        <p id="result"></p>

        <!-- Das große "Erfolgs"-Katzen-GIF -->
        <img id="cat" alt="Happy Cat GIF">

        <div id="liveBox">
            <h3>🔥 Live Antwort:</h3>
            <p id="liveText">Noch nichts passiert...</p>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "du";

document.getElementById("title").innerText = `Hey Bebek, willst du mein Date sein?`;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const cat = document.getElementById("cat");
const liveText = document.getElementById("liveText");

let attempts = 0;

// LIVE
socket.on("liveUpdate", (msg) => {
    liveText.innerText = msg;
});

// JA
yesBtn.onclick = async () => {
    const date = document.getElementById("date").value;

    const res = await fetch("/answer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({date, name})
    });

    const data = await res.json();

    result.innerHTML = data.message;

    // Stabiler Link für das feiernde Haupt-Katzen-GIF
    cat.src = "https://media.tenor.com/0v8gWfXhE78AAAAi/happy-cat-dance.gif"; 
    cat.style.display = "block";

    megaConfetti();
};

// NEIN → läuft weg
function moveButton() {
    attempts++;

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    const messages = [
        "😏 nope",
        "😜 zu langsam",
        "😈 versuch's nochmal",
        "😂 keine Chance",
        "😹 ich bin weg"
    ];

    result.innerHTML = messages[Math.min(attempts, messages.length - 1)];
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("click", moveButton);

// KONFETTI
function megaConfetti() {
    for (let i = 0; i < 120; i++) {
        const el = document.createElement("div");
        el.className = "confetti";

        el.style.left = Math.random() * 100 + "vw";
        el.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        el.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}
</script>

</body>
</html>
