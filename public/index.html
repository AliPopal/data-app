<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date App 😏</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec, #f8bbd0);
    color: #333;
    overflow: hidden; /* Beibehalten für den weglaufenden Button */
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 500px;
    width: 90%;
    z-index: 10;
    position: relative;
}

h1 {
    color: #880e4f;
    margin-bottom: 25px;
    font-size: 2.3rem;
}

input[type="date"] {
    padding: 12px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 8px;
    margin-bottom: 25px;
    width: 100%;
    box-sizing: border-box;
}

.btn-group {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    z-index: 11;
}

#yesBtn {
    background-color: #4caf50;
    color: white;
}

#noBtn {
    background-color: #f44336;
    color: white;
}

#result {
    margin-top: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #444;
}

/* Das große Haupt-GIF (beim JA) */
#cat {
    width: 100%;
    max-width: 300px;
    border-radius: 15px;
    margin: 20px auto 0 auto;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

#liveBox {
    margin-top: 35px;
    padding: 20px;
    border: 2px dashed #aaa;
    border-radius: 15px;
    background-color: #fcfcfc;
}

/* Konfetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    animation: fall linear forwards;
    z-index: 20;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* --- Sichtbare & animierte Katzen-Sticker im Frontend --- */
.cat-sticker {
    position: fixed;
    width: 140px;
    height: 140px;
    object-fit: contain;
    z-index: 2; /* Sichtbar vor dem Hintergrund platziert */
    border-radius: 10px;
    transition: transform 0.3s ease;
}

/* Sticker leicht neigen für cooleren Look */
.cat-sticker:hover {
    transform: scale(1.1) rotate(5deg);
}

/* Verteilung auf dem Bildschirm */
#bg-cat-1 { top: 8%; left: 8%; }
#bg-cat-2 { top: 8%; right: 8%; }
#bg-cat-3 { bottom: 8%; left: 8%; }
#bg-cat-4 { bottom: 8%; right: 8%; }

/* Mobile Optimierung: Sticker werden etwas kleiner, damit sie nicht stören */
@media (max-width: 800px) {
    .cat-sticker {
        width: 80px;
        height: 80px;
    }
    #bg-cat-1 { top: 2%; left: 2%; }
    #bg-cat-2 { top: 2%; right: 2%; }
    #bg-cat-3 { bottom: 2%; left: 2%; }
    #bg-cat-4 { bottom: 2%; right: 2%; }
}
</style>
</head>

<body>

    <!-- Die sichtbaren Katzen-GIFs auf der Seite -->
    <img id="bg-cat-1" class="cat-sticker" src="https://media.tenor.com/bK777gSh6Y0AAAAj/kitty-cat.gif" alt="Katze 1">
    <img id="bg-cat-2" class="cat-sticker" src="https://media.tenor.com/J3Z7978Z9wAAAAAj/cat-cats.gif" alt="Katze 2">
    <img id="bg-cat-3" class="cat-sticker" src="https://media.tenor.com/v8p77R94Z6IAAAAj/kitty-cat.gif" alt="Katze 3">
    <img id="bg-cat-4" class="cat-sticker" src="https://media.tenor.com/0v8gWfXhE78AAAAj/happy-cat-dance.gif" alt="Katze 4">

    <div class="container">
        <h1 id="title"></h1>

        <input type="date" id="date"><br>

        <div class="btn-group">
            <button id="yesBtn">Ja 😍</button>
            <button id="noBtn">Nein 😈</button>
        </div>

        <p id="result"></p>

        <!-- Haupt-GIF Platzhalter (wird bei JA geladen) -->
        <img id="cat" alt="Happy Cat GIF">

        <div id="liveBox">
            <h3>🔥 Live Antwort:</h3>
            <p id="liveText">Noch nichts passiert...</p>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>

<script>
// Initialisierung
const socket = io();
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "du";

// UI Elemente holen
const title = document.getElementById("title");
const dateInput = document.getElementById("date");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const cat = document.getElementById("cat");
const liveText = document.getElementById("liveText");

// Titel setzen
title.innerText = `Hey Bebek, willst du mein Date sein?`;

let attempts = 0;

// LIVE updates empfangen
socket.on("liveUpdate", (msg) => {
    liveText.innerText = msg;
});

// JA - Bestätigung
yesBtn.onclick = async () => {
    const date = dateInput.value;

    try {
        const res = await fetch("/answer", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({date, name})
        });
        const data = await res.json();
        result.innerHTML = data.message;
    } catch (e) {
        result.innerHTML = "OMG 😍 du hat JA gesagt!"; 
    }

    // Haupt-Erfolgs-GIF laden
    cat.src = "https://media.tenor.com/269_9MvX0XIAAAAj/cat-cute.gif"; 
    cat.style.display = "block";

    megaConfetti();
};

// NEIN → läuft weg
function moveButton() {
    attempts++;

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.position = "absolute";
    noBtn.style.left = Math.max(10, Math.random() * maxX) + "px";
    noBtn.style.top = Math.max(10, Math.random() * maxY) + "px";

    const messages = [
        "😏 nope",
        "😜 zu langsam",
        "😈 versuch's nochmal",
        "😂 keine Chance",
        "😹 ich bin weg"
    ];

    result.innerHTML = messages[Math.min(attempts, messages.length - 1)];
}

// Events für den weglaufenden Button
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveButton(); });
noBtn.addEventListener("click", moveButton);

// KONFETTI Effekt
function megaConfetti() {
    for (let i = 0; i < 120; i++) {
        const el = document.createElement("div");
        el.className = "confetti";
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = -10 + "px";
        el.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        el.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}
</script>

</body>
</html>
