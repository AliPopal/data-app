<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date App 😏</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec, #f8bbd0);
    color: #333;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 500px;
    width: 90%;
    z-index: 10;
    position: relative;
}

h1 {
    color: #880e4f;
    margin-bottom: 25px;
    font-size: 2.3rem;
}

input[type="date"] {
    padding: 12px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 8px;
    margin-bottom: 25px;
    width: 100%;
    box-sizing: border-box;
}

.btn-group {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    z-index: 11;
}

#yesBtn {
    background-color: #4caf50;
    color: white;
}

#noBtn {
    background-color: #f44336;
    color: white;
}

#result {
    margin-top: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #444;
}

#cat {
    width: 100%;
    max-width: 300px;
    border-radius: 15px;
    margin: 20px auto 0 auto;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

#liveBox {
    margin-top: 35px;
    padding: 20px;
    border: 2px dashed #aaa;
    border-radius: 15px;
    background-color: #fcfcfc;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    animation: fall linear forwards;
    z-index: 20;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* Katzen-Sticker: standardmäßig versteckt, erscheinen erst bei "Ja" */
.cat-sticker {
    position: fixed;
    width: 140px;
    height: 140px;
    object-fit: contain;
    z-index: 2;
    border-radius: 10px;
    display: none;
    opacity: 0;
    transform: scale(0.5);
    transition: transform 0.4s ease, opacity 0.4s ease;
}

.cat-sticker.show {
    display: block;
    opacity: 1;
    transform: scale(1);
}

.cat-sticker:hover {
    transform: scale(1.1) rotate(5deg);
}

#bg-cat-1 { top: 8%; left: 8%; }
#bg-cat-2 { top: 8%; right: 8%; }
#bg-cat-3 { bottom: 8%; left: 8%; }
#bg-cat-4 { bottom: 8%; right: 8%; }

@media (max-width: 800px) {
    .cat-sticker {
        width: 80px;
        height: 80px;
    }
    #bg-cat-1 { top: 2%; left: 2%; }
    #bg-cat-2 { top: 2%; right: 2%; }
    #bg-cat-3 { bottom: 2%; left: 2%; }
    #bg-cat-4 { bottom: 2%; right: 2%; }
}
</style>
</head>

<body>

    <img id="bg-cat-1" class="cat-sticker" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="Katze 1" onerror="this.style.outline='2px solid red'; console.error('bg-cat-1 GIF konnte nicht geladen werden');">
    <img id="bg-cat-2" class="cat-sticker" src="https://media.giphy.com/media/13CoXDiaCcCoyk/giphy.gif" alt="Katze 2" onerror="this.style.outline='2px solid red'; console.error('bg-cat-2 GIF konnte nicht geladen werden');">
    <img id="bg-cat-3" class="cat-sticker" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="Katze 3" onerror="this.style.outline='2px solid red'; console.error('bg-cat-3 GIF konnte nicht geladen werden');">
    <img id="bg-cat-4" class="cat-sticker" src="https://media.giphy.com/media/xUOxf48UBRxRi2gJ7W/giphy.gif" alt="Katze 4" onerror="this.style.outline='2px solid red'; console.error('bg-cat-4 GIF konnte nicht geladen werden');">

    <div class="container">
        <h1 id="title"></h1>

        <input type="date" id="date"><br>

        <div class="btn-group">
            <button id="yesBtn">Ja 😍</button>
            <button id="noBtn">Nein 😈</button>
        </div>

        <p id="result"></p>

        <img id="cat" alt="Happy Cat GIF" onerror="console.error('Haupt-Katze GIF konnte nicht geladen werden');">

        <div id="liveBox">
            <h3>🔥 Live Antwort:</h3>
            <p id="liveText">Noch nichts passiert...</p>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "du";

const title = document.getElementById("title");
const dateInput = document.getElementById("date");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const cat = document.getElementById("cat");
const liveText = document.getElementById("liveText");
const bgCats = document.querySelectorAll(".cat-sticker");

title.innerText = `Hey Bebek, willst du mein Date sein?`;

let attempts = 0;

socket.on("liveUpdate", (msg) => {
    liveText.innerText = msg;
});

yesBtn.onclick = async () => {
    const date = dateInput.value;

    try {
        const res = await fetch("/answer", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({date, name})
        });
        const data = await res.json();
        result.innerHTML = data.message;
    } catch (e) {
        result.innerHTML = "OMG 😍 du hat JA gesagt!";
    }

    cat.src = "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif";
    cat.style.display = "block";

    bgCats.forEach((el, i) => {
        setTimeout(() => el.classList.add("show"), i * 150);
    });

    megaConfetti();
};

function moveButton() {
    attempts++;

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.position = "absolute";
    noBtn.style.left = Math.max(10, Math.random() * maxX) + "px";
    noBtn.style.top = Math.max(10, Math.random() * maxY) + "px";

    const messages = [
        "😏 nope",
        "😜 zu langsam",
        "😈 versuch's nochmal",
        "😂 keine Chance",
        "😹 ich bin weg"
    ];

    result.innerHTML = messages[Math.min(attempts, messages.length - 1)];
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveButton(); });
noBtn.addEventListener("click", moveButton);

function megaConfetti() {
    for (let i = 0; i < 120; i++) {
        const el = document.createElement("div");
        el.className = "confetti";
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = -10 + "px";
        el.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        el.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}
</script>

</body>
</html>
